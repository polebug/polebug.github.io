<p><b>&lt;目录&gt;</b><br>1.fork 项目后，与原项目进行同步</p>
<a id="more"></a>
<p></p><h2>fork 项目后，与原项目进行同步</h2><br>如何优雅的解决？<p></p>
<hr>
<p>简单的说就是把原项目和 fork 到自己仓库下的项目都 clone 到本地，由此建立连接。然后 fetch 原项目的更新到本地，合并更新，最后 push 到 github 仓库。</p>
<p>比如，我 fork 了 LCTT 的翻译项目到我的仓库 (polebug)，现在需要与 LCTT 的项目同步：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div></pre></td><td class="code"><pre><div class="line">clone 自己仓库下的项目</div><div class="line">$ git clone https://github.com/polebug/TranslationProject.git</div><div class="line">  </div><div class="line">$ cd ~/TranslationProject</div><div class="line">  </div><div class="line">clone 原项目，自定义为 upstream</div><div class="line">$ git remote add upstream https://github.com/LCTT/TranslationProject.git</div><div class="line">  </div><div class="line">$ git remote -v </div><div class="line">  </div><div class="line">fetch 原项目更新的内容</div><div class="line">$ git fetch upstream</div><div class="line">  </div><div class="line">merge</div><div class="line">$ git checkout master</div><div class="line">$ git merge upstream/master</div><div class="line">  </div><div class="line">push</div><div class="line">$ git push -u origin master</div></pre></td></tr></table></figure>
